name: Release - HarmonyOS

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release-harmony:
    name: Build & Publish HarmonyOS
    runs-on: macos-latest
    timeout-minutes: 30
    # Only run when tag matches AGenUI-* format
    if: startsWith(github.event.release.tag_name, 'AGenUI-')

    steps:
      # ==================== Setup ====================
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#AGenUI-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION} from tag: ${TAG}"

          # Extract base version (x.y.z) - used for artifact naming
          BASE_VERSION=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Base version: ${BASE_VERSION}"

          # Determine if this is a stable release (x.y.z only, no suffix)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "This is a STABLE release"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "This is a PRE-RELEASE (${VERSION})"
          fi

      - name: Verify version consistency
        run: |
          HEADER_VERSION=$(grep -o '#define AGENUI_VERSION "[^"]*"' core/include/agenui_version.h | sed 's/#define AGENUI_VERSION "//;s/"//')
          BASE_VERSION="${{ steps.version.outputs.base_version }}"
          if [[ "$HEADER_VERSION" != "$BASE_VERSION" ]]; then
            echo "::error::Version mismatch! Tag base version: ${BASE_VERSION}, agenui_version.h: ${HEADER_VERSION}"
            echo "Please ensure the version in core/include/agenui_version.h matches the tag."
            exit 1
          fi
          echo "✅ Version verified: header=${HEADER_VERSION}, tag base=${BASE_VERSION}"

      # ==================== Build Environment ====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup HarmonyOS Command Line Tools
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1

      - name: Install HarmonyOS SDK
        run: |
          # Set locale to CN so sdkmgr can reach Huawei's CDN
          export JAVA_TOOL_OPTIONS="$JAVA_TOOL_OPTIONS -Duser.country=CN"

          # Install HarmonyOS toolchains (compiler, native NDK, system libs)
          sdkmgr install toolchains:9 OpenHarmony/toolchains:9 --accept-license

      - name: Configure build environment
        run: |
          # Point DEVECO_HOME to the Command Line Tools root installed by the
          # setup action so that build.sh can locate hvigorw / ohpm / node.
          CLT_ROOT="$(dirname "$(dirname "$(which sdkmgr)")")"
          echo "DEVECO_HOME=${CLT_ROOT}" >> $GITHUB_ENV
          echo "DEVECO_SDK_HOME=${CLT_ROOT}/sdk" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=${CLT_ROOT}/hwsdk" >> $GITHUB_ENV

      # ==================== Build HAR ====================
      - name: Build HarmonyOS HAR
        env:
          AGENUI_FULL_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/harmony/build.sh --mode release

      - name: Verify HAR artifacts
        run: |
          HAR_PATH="dist/harmony/release/agenui.har"
          LITE_PATH="dist/harmony/release/agenui-lite.har"
          if [[ ! -f "$HAR_PATH" ]]; then
            echo "::error::Expected HAR not found: ${HAR_PATH}"
            ls -la dist/harmony/release/ 2>/dev/null || echo "dist/harmony/release/ does not exist"
            exit 1
          fi
          if [[ ! -f "$LITE_PATH" ]]; then
            echo "::error::Expected lite HAR not found: ${LITE_PATH}"
            exit 1
          fi
          echo "✅ HAR artifacts verified:"
          ls -lh dist/harmony/release/

      # ==================== Upload to GitHub Release ====================
      - name: Upload HAR to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_VERSION="${{ steps.version.outputs.base_version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Rename artifacts with version for release
          HAR_DEST="AGenUI-${BASE_VERSION}-harmony.har"
          LITE_DEST="AGenUI-${BASE_VERSION}-harmony-lite.har"

          cp "dist/harmony/release/agenui.har" "${HAR_DEST}"
          cp "dist/harmony/release/agenui-lite.har" "${LITE_DEST}"

          echo "Uploading ${HAR_DEST} to release ${TAG}..."
          gh release upload "${TAG}" "${HAR_DEST}" --clobber

          echo "Uploading ${LITE_DEST} to release ${TAG}..."
          gh release upload "${TAG}" "${LITE_DEST}" --clobber

          echo "✅ Upload complete"

      # ==================== Summary ====================
      - name: Summary
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_STABLE="${{ steps.version.outputs.is_stable }}"
          echo "## HarmonyOS Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Type | $([ "$IS_STABLE" = 'true' ] && echo 'Stable' || echo 'Pre-release') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | HAR + lite HAR uploaded ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Uploaded Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Description |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`AGenUI-${VERSION}-harmony.har\` | Full HAR (includes all .so) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`AGenUI-${VERSION}-harmony-lite.har\` | Lite HAR (third-party .so stripped) |" >> "$GITHUB_STEP_SUMMARY"
