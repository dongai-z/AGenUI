name: Studio Release

on:
  push:
    tags:
      - "AGenUI-*"

permissions:
  contents: write

jobs:
  pack-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack AGenUI Studio
        run: |
          chmod +x scripts/pack-studio.sh
          ./scripts/pack-studio.sh dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agenui-studio.zip
          generate_release_notes: true
