name: CI - HarmonyOS

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'platforms/harmony/**'
      - 'scripts/harmony/**'
      - 'scripts/common/**'
      - '.github/workflows/ci-harmony.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'platforms/harmony/**'
      - 'scripts/harmony/**'
      - 'scripts/common/**'
      - '.github/workflows/ci-harmony.yml'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: ci-harmony-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: HarmonyOS Build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup HarmonyOS Command Line Tools
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1

      - name: Install HarmonyOS SDK
        run: |
          # Set locale to CN so sdkmgr can reach Huawei's CDN
          export JAVA_TOOL_OPTIONS="$JAVA_TOOL_OPTIONS -Duser.country=CN"

          # Install HarmonyOS toolchains (compiler, native NDK, system libs)
          sdkmgr install toolchains:9 OpenHarmony/toolchains:9 --accept-license

      - name: Configure build environment
        run: |
          # Point DEVECO_HOME to the Command Line Tools root installed by the
          # setup action so that build.sh can locate hvigorw / ohpm / node.
          CLT_ROOT="$(dirname "$(dirname "$(which sdkmgr)")")"
          echo "DEVECO_HOME=${CLT_ROOT}" >> $GITHUB_ENV
          echo "DEVECO_SDK_HOME=${CLT_ROOT}/sdk" >> $GITHUB_ENV

          # HOS_SDK_HOME is the conventional env var for the actual SDK
          echo "HOS_SDK_HOME=${CLT_ROOT}/hwsdk" >> $GITHUB_ENV

      - name: Build HarmonyOS HAR
        run: ./scripts/harmony/build.sh --mode ${{ inputs.build_mode || 'release' }}

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: harmony-har-${{ github.sha }}
          path: dist/harmony/
          retention-days: 7
