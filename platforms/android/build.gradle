plugins {
    alias(libs.plugins.android.library)
    id 'maven-publish'
}

// ==================== Maven Publishing Configuration ====================
// Coordinates: com.amap.genui:agenui-sdk:<version> (version in gradle.properties)
//
// Publish to local Maven (development):
//   ./gradlew publishReleasePublicationToLocalMavenRepository
//
// Publish to remote Maven (production):
//   Set env vars: MAVEN_URL / MAVEN_USERNAME / MAVEN_PASSWORD
//   ./gradlew publishReleasePublicationToRemoteMavenRepository

def localMavenDir = "${System.getProperty('user.home')}/.m2/repository"

// ==================== Yoga Configuration (dual-control) ====================
// Two independent controls:
//   1. yoga.prebuilt.dir  — path to prebuilt yoga (libyoga.so + headers)
//   2. yoga.include.in.aar — whether to bundle libyoga.so into the AAR (default: true)
//
// Priority: Gradle -P parameter > local.properties > default (FetchContent + include)
// ============================================================================

// --- Read local.properties for yoga config ---
def localProps = new Properties()
def localPropsFile = file("${rootProject.projectDir}/local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}

// --- Resolve YOGA_PREBUILT_DIR ---
def resolvedYogaPrebuiltDir = ''
if (project.hasProperty('YOGA_PREBUILT_DIR')) {
    resolvedYogaPrebuiltDir = project.property('YOGA_PREBUILT_DIR')
    logger.lifecycle("[yoga] Using prebuilt dir from -P parameter: ${resolvedYogaPrebuiltDir}")
} else if (localProps.containsKey('yoga.prebuilt.dir')) {
    resolvedYogaPrebuiltDir = localProps.getProperty('yoga.prebuilt.dir')
    logger.lifecycle("[yoga] Using prebuilt dir from local.properties: ${resolvedYogaPrebuiltDir}")
}
// Validate if set
if (resolvedYogaPrebuiltDir && !file("${resolvedYogaPrebuiltDir}/libs/libyoga.so").exists()) {
    throw new GradleException("[yoga] ERROR: yoga.prebuilt.dir is set but invalid — " +
        "libyoga.so not found at: ${resolvedYogaPrebuiltDir}/libs/libyoga.so")
}

// --- Resolve YOGA_INCLUDE_IN_AAR (default: true) ---
def resolvedYogaIncludeInAar = true
if (project.hasProperty('YOGA_INCLUDE_IN_AAR')) {
    resolvedYogaIncludeInAar = project.property('YOGA_INCLUDE_IN_AAR').toString().toBoolean()
    logger.lifecycle("[yoga] Include in AAR from -P parameter: ${resolvedYogaIncludeInAar}")
} else if (localProps.containsKey('yoga.include.in.aar')) {
    resolvedYogaIncludeInAar = localProps.getProperty('yoga.include.in.aar').toBoolean()
    logger.lifecycle("[yoga] Include in AAR from local.properties: ${resolvedYogaIncludeInAar}")
}

if (!resolvedYogaPrebuiltDir) {
    logger.lifecycle("[yoga] No prebuilt configured — will use GitHub FetchContent (built-in)")
} else {
    logger.lifecycle("[yoga] Prebuilt: ${resolvedYogaPrebuiltDir}, include in AAR: ${resolvedYogaIncludeInAar}")
}

android {
    namespace 'com.amap.a2ui_sdk'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 35

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"

        // C++ configuration
        // Inject the repo root into CMake via -DAGENUI_REPO_ROOT to avoid using .. traversal in CMakeLists.
        // rootProject.projectDir = platforms/android/, its parentFile = platforms/,
        // and the next parentFile = the agenui/ repo root.
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                abiFilters 'arm64-v8a'
                // When using prebuilt yoga (compiled with c++_shared), we must use c++_shared
                // to avoid mixing STL types in the same process (NDK requirement).
                def stlType = resolvedYogaPrebuiltDir ? "c++_shared" : "c++_static"
                def cmakeArgs = ["-DANDROID_STL=" + stlType,
                          "-DAGENUI_REPO_ROOT=" + rootProject.projectDir.parentFile.parentFile.absolutePath]
                // Pass YOGA_PREBUILT_DIR to CMake if resolved
                if (resolvedYogaPrebuiltDir) {
                    cmakeArgs.add("-DYOGA_PREBUILT_DIR=" + resolvedYogaPrebuiltDir)
                }
                arguments(*cmakeArgs)
            }
        }
    }

    buildTypes {
        debug {
            externalNativeBuild {
                cmake {
                    arguments "-DCMAKE_BUILD_TYPE=Debug"
                }
            }
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            externalNativeBuild {
                cmake {
                    arguments "-DCMAKE_BUILD_TYPE=Release"
                }
            }
        }
    }

    // CMake configuration
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.18.1"
        }
    }

    ndkVersion "27.3.13750724"

    // Exclude libyoga.so and libc++_shared.so from AAR when configured not to include yoga.
    // In this mode, the host app is responsible for providing both libraries.
    if (resolvedYogaPrebuiltDir && !resolvedYogaIncludeInAar) {
        packagingOptions {
            exclude '**/libyoga.so'
            exclude '**/libc++_shared.so'
        }
    }

    sourceSets {
        main {
            res.srcDirs = ['src/main/res', 'src/main/res-icons']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation libs.picasso
    implementation libs.gson
    implementation libs.cardview
    implementation libs.viewpager2
    implementation libs.recyclerview

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}

// ==================== afterEvaluate: Publishing ====================
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId    = SDK_GROUP_ID
                artifactId = SDK_ARTIFACT_ID
                version    = SDK_VERSION

                def normalAar = file("${buildDir}/outputs/aar/${project.name}-release.aar")
                artifact(normalAar)

                pom {
                    name        = 'AGenUI'
                    description = 'A Native Renderer for A2UI - AGen UI SDK.'
                    url         = 'https://github.com/AGenUI/AGenUI-Client-Android'

                    licenses {
                        license {
                            name = 'Apache-2.0'
                            url  = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }

                    // Transitive dependency declarations
                    withXml {
                        def deps = asNode().appendNode('dependencies')
                        configurations.releaseRuntimeClasspath
                            .resolvedConfiguration
                            .resolvedArtifacts
                            .findAll { it.moduleVersion.id.group != project.group }
                            .each { artifact ->
                                def dep = deps.appendNode('dependency')
                                dep.appendNode('groupId',    artifact.moduleVersion.id.group)
                                dep.appendNode('artifactId', artifact.moduleVersion.id.name)
                                dep.appendNode('version',    artifact.moduleVersion.id.version)
                                dep.appendNode('scope',      'runtime')
                            }
                    }
                }
            }
        }

        repositories {
            maven {
                name = 'LocalMaven'
                url  = uri(localMavenDir)
            }

            if (System.getenv('MAVEN_URL')) {
                maven {
                    name = 'RemoteMaven'
                    url  = uri(System.getenv('MAVEN_URL'))
                    credentials {
                        username = System.getenv('MAVEN_USERNAME') ?: ''
                        password = System.getenv('MAVEN_PASSWORD') ?: ''
                    }
                }
            }
        }
    }
}
